<!DOCTYPE html>
<html>
<head>
    <title>Monopoly Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background-color: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        #svg-display {
            max-width: 90vw;
            max-height: 85vh;
        }
        .controls {
            margin-top: 0px;
        }
        button {
            font-size: 32px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #4CAF50;
            color: white;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .info {
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="svg-display" src="tauler-000.svg" alt="SVG Image">
        <div class="controls">
            <button id="btn-first" onclick="goToFirst()">⏮️</button>
            <button id="btn-prev" onclick="goToPrev()">⬅️</button>
            <button id="btn-next" onclick="goToNext()">➡️</button>
            <button id="btn-last" onclick="goToLast()">⏭️</button>
        </div>
        <div class="info">
            <span id="current-info">1 / 24</span>
        </div>
    </div>
    
    <script>
        const svgPaths = ['tauler-000.svg', 'tauler-001.svg', 'tauler-002.svg', 'tauler-003.svg', 'tauler-004.svg', 'tauler-005.svg', 'tauler-006.svg', 'tauler-007.svg', 'tauler-008.svg', 'tauler-009.svg', 'tauler-010.svg', 'tauler-011.svg', 'tauler-012.svg', 'tauler-013.svg', 'tauler-014.svg', 'tauler-015.svg', 'tauler-016.svg', 'tauler-017.svg', 'tauler-018.svg', 'tauler-019.svg', 'tauler-020.svg', 'tauler-021.svg', 'tauler-022.svg', 'tauler-023.svg'];
        let currentIndex = 0;
        
        function updateDisplay() {
            const img = document.getElementById('svg-display');
            img.src = svgPaths[currentIndex];
            
            document.getElementById('current-info').textContent = 
                (currentIndex + 1) + ' / ' + svgPaths.length;
            
            // Update button states
            document.getElementById('btn-first').disabled = currentIndex === 0;
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').disabled = currentIndex === svgPaths.length - 1;
            document.getElementById('btn-last').disabled = currentIndex === svgPaths.length - 1;
        }
        
        function goToFirst() {
            currentIndex = 0;
            updateDisplay();
        }
        
        function goToPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }
        
        function goToNext() {
            if (currentIndex < svgPaths.length - 1) {
                currentIndex++;
                updateDisplay();
            }
        }
        
        function goToLast() {
            currentIndex = svgPaths.length - 1;
            updateDisplay();
        }
        
        // Initialize on page load
        updateDisplay();
    </script>
</body>
</html>
